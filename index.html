<!DOCTYPE html>
<html lang="pl">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="ie=edge" />
        <title>My Eduweb.pl</title>
        <script
            src="https://kit.fontawesome.com/6e30b4ae66.js"
            crossorigin="anonymous"
        ></script>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-KyZXEAg3QhqLMpG8r+8fhAXLRk2vvoC2f3B09zVXn8CA5QIVfZOJ3BCsw2P0p/We"
            crossorigin="anonymous"
        />
        <link rel="stylesheet" href="css/reset.css" />
        <link rel="stylesheet" href="css/style.css" />
    </head>
    <body>
        <header id="header" class="container-fluid">
            <img src="/img/eduweb.svg" id="logo" alt="logo" />
            <ul class="main-nav">
                <li><a href="#">Kursy</a></li>
                <li><a href="#">Ścieżki</a></li>
                <li><a href="#">Ceny</a></li>
                <li><a href="#">Nowości</a></li>
                <li><a href="#">Pomoc</a></li>
            </ul>
        </header>

        <div class="mobile-menu-wrapper">
            <div class="container-fluid">
                <div class="row">
                    <div class="col">asd</div>
                </div>
            </div>
        </div>

        <ul class="mobile-menu">
            <li class="menu-item">
                <a class="item-link" href="#"
                    ><img
                        class="item-image"
                        src="img/mobile-icons/nauka-icon.svg"
                        alt=""
                    />
                    <p class="item-text">Główna</p></a
                >
            </li>
            <li>
                <a href="#"
                    ><img src="img/mobile-icons/people-icon.svg" alt="" />
                    <p>Zespoły</p></a
                >
            </li>
            <li>
                <a href="#"
                    ><img src="img/mobile-icons/playlists-icon.svg" alt="" />
                    <p>Playlisty</p></a
                >
            </li>
            <li class="menu-item">
                <a href="#"
                    ><img src="img/mobile-icons/thunder-icon.svg" alt="" />
                    <p>Zadania</p></a
                >
            </li>
            <li>
                <a id="mobile-menu-button" href="#"><span>MENU</span></a>
            </li>
        </ul>
        <ul class="mobile-menu-extends">
            <li>
                <a href="#">Kursy</a>
            </li>
            <li>
                <a href="#">Śieżki</a>
            </li>
            <li>
                <a href="#">Cennik</a>
            </li>
            <li>
                <a href="#">Nowości</a>
            </li>
            <li>
                <a href="#">Pomoc</a>
            </li>
            <li>
                <a href="#"><p>Miło Cię widzieć, Damian</p></a>
            </li>
            <li>
                <form action="">
                    <input type="search" placeholder="Wyszukaj" />
                    <button class="fas fa-search"></button>
                </form>
                <button>X</button>
            </li>
        </ul>

        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-U1DAWAznBHeqEIlVSCgzq+c9gqGAJn5c/t99JyeKa9xxaYpSvHU5awsuZVVFIhvj"
            crossorigin="anonymous"
        ></script>
        <script
            src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"
            integrity="sha384-eMNCOe7tC1doHpGoWe/6oMVemdAVTMs2xqW4mwXrXsW0L84Iytr2wi5v2QjrP/xp"
            crossorigin="anonymous"
        ></script>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.min.js"
            integrity="sha384-cn7l7gDp0eyniUwwAZgrzD06kc/tftFf19TOAs2zVinnD/C7E91j9yyk5//jjpt/"
            crossorigin="anonymous"
        ></script>
        <script src="/js/app.js"></script>
    </body>
</html>
